<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Predictor • AI-Powered Analytics</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-hover: #7C3AED;
            --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #312E81 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Ambient Glow Objects */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            position: relative;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(139, 92, 246, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #C4B5FD, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #8B5CF6 0%, #6366F1 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .result-container.active {
            opacity: 1;
            transform: translateY(0);
        }

        #result {
            font-size: 2.5rem;
            font-weight: 800;
            color: #10B981; /* Emerald gradient color */
            background: linear-gradient(to right, #34D399, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1>AI Marks Predictor</h1>
                <p>Enter your study hours to forecast your score</p>
            </div>

            <div class="input-group">
                <label for="hours">Average Study Hours</label>
                <input type="number" id="hours" placeholder="e.g. 5.5" step="0.5" autofocus>
            </div>

            <button id="predictBtn" onclick="predict()">
                <span class="btn-text">Check Prediction</span>
                <div class="spinner" id="spinner"></div>
            </button>

            <div class="result-container" id="resultContainer">
                <p class="result-label">Predicted Result</p>
                <h3 id="result">85.4</h3>
                <p class="footer-note">Based on machine learning insights</p>
            </div>
        </div>
    </div>

    <script>
        function predict() {
            const hoursInput = document.getElementById("hours");
            const hours = hoursInput.value;
            const btn = document.getElementById("predictBtn");
            const btnText = btn.querySelector(".btn-text");
            const spinner = document.getElementById("spinner");
            const resultContainer = document.getElementById("resultContainer");
            const resultDisplay = document.getElementById("result");

            if (!hours || hours <= 0) {
                hoursInput.style.borderColor = "#EF4444";
                return;
            } else {
                hoursInput.style.borderColor = "var(--glass-border)";
            }

            // UI Feedback
            btn.disabled = true;
            btnText.style.opacity = "0.5";
            spinner.style.display = "block";
            resultContainer.classList.remove("active");

            fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({hours: hours})
            })
            .then(res => res.json())
            .then(data => {
                // Formatting decimals for a cleaner look
                const score = parseFloat(data.predicted_marks).toFixed(1);
                resultDisplay.innerText = score;
                
                // Show result with animation
                setTimeout(() => {
                    btn.disabled = false;
                    btnText.style.opacity = "1";
                    spinner.style.display = "none";
                    resultContainer.classList.add("active");
                }, 400);
            })
            .catch(err => {
                console.error(err);
                btn.disabled = false;
                btnText.innerText = "Error - Try Again";
                btnText.style.opacity = "1";
                spinner.style.display = "none";
            });
        }

        // Allow Enter key to trigger prediction
        document.getElementById("hours").addEventListener("keypress", (e) => {
            if (e.key === "Enter") predict();
        });
    </script>

</body>
</html>
